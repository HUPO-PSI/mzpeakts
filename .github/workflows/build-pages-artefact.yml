name: Build Pages Demo

on:
  push:
    branches: [main]


jobs:
  build-demo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          # cache: 'npm'
      - name: Install dependencies
        run: |
          echo `pwd`
          npm install ../lib/vendor/parquet-wasm/pkg/
          npm install --install-links ../lib
          npm install --install-links --include=dev .

      - name: Build Demo
        run: npm run build
      - name: Copy static data
        run: |
          cp -r static/ dist/app/
          mv dist/app/index.html dist/app/app.html
          cp ../index.html dist/app/
      - name: Upload demo application single file application
        uses: actions/upload-pages-artifact@v5
        with:
            path: app/dist/app/

  deploy-pages:
    needs: build-demo
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5


